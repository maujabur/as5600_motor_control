; PlatformIO Project Configuration File
;
;   Build options: build flags, source filter
;   Upload options: custom upload port, speed and extra flags
;   Library options: dependencies, extra library storages
;   Advanced options: extra scripting
;
; Please visit documentation for the other options and examples
; https://docs.platformio.org/page/projectconf.html

[platformio]
; Placa principal no momento: Waveshare ESP32-S3-Zero
default_envs = waveshare_esp32_s3_zero

[env:waveshare_esp32_s3_zero]
platform = https://github.com/pioarduino/platform-espressif32.git#55.03.38
board = waveshare_esp32_s3_zero
framework = arduino

; A placa ja define USB_MODE=1; habilitamos o CDC no boot para Serial/monitor.
build_flags =
    -DARDUINO_USB_CDC_ON_BOOT=1

monitor_speed = 115200
monitor_dtr = 0
monitor_rts = 0

[env:waveshare_esp32_s3_zero_ota]
extends = env:waveshare_esp32_s3_zero
upload_protocol = espota
upload_port = 192.168.4.1
upload_flags =
    --port=3232
    --auth=as5600-update
