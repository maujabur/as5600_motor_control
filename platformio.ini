; PlatformIO Project Configuration File
;
;   Build options: build flags, source filter
;   Upload options: custom upload port, speed and extra flags
;   Library options: dependencies, extra library storages
;   Advanced options: extra scripting
;
; Please visit documentation for the other options and examples
; https://docs.platformio.org/page/projectconf.html

[platformio]
; Placa principal no momento: Waveshare ESP32-S3-Zero
default_envs = waveshare_esp32_s3_zero

[env:waveshare_esp32_s3_zero]
platform = https://github.com/pioarduino/platform-espressif32.git#55.03.38
board = waveshare_esp32_s3_zero
framework = arduino

; A placa ja define USB_MODE=1; habilitamos o CDC no boot para Serial/monitor.
build_flags =
    -DARDUINO_USB_CDC_ON_BOOT=1

monitor_speed = 115200
monitor_dtr = 0
monitor_rts = 0

[env:esp32c3_supermini]
platform = espressif32@7.0.0
board = esp32-c3-devkitm-1
framework = arduino

; No ESP32-C3 Super Mini deste projeto, usamos a USB CDC para expor o
; monitor serial pela USB nativa.
build_flags = 
    -D ARDUINO_USB_MODE=1
    -D ARDUINO_USB_CDC_ON_BOOT=1

monitor_speed = 115200
monitor_dtr = 0
monitor_rts = 0


[env:esp32s2_mini]
platform = espressif32@7.0.0
board = esp32-s2-saola-1
framework = arduino

; Configurações específicas para ESP32-S2 Mini com ESP32-S2FNR2
build_flags = 
    -DBOARD_HAS_PSRAM
    -mfix-esp32-psram-cache-issue
    -DARDUINO_USB_MODE=0
    -DARDUINO_USB_CDC_ON_BOOT=1

monitor_speed = 115200

[env:esp32s2_mini_core3_test]
platform = https://github.com/pioarduino/platform-espressif32.git#55.03.38
board = esp32-s2-saola-1
framework = arduino

; Ambiente isolado para testar Arduino-ESP32 3.x sem mexer no env estável

build_flags =
    -DBOARD_HAS_PSRAM
    -mfix-esp32-psram-cache-issue
    -DARDUINO_USB_MODE=0
    -DARDUINO_USB_CDC_ON_BOOT=1

monitor_speed = 115200
